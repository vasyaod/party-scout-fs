<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Party Scout — SF / Bay Area weekly</title>
<style>
  :root{
    --bg:#0c0a14; --panel:#161226; --panel2:#1d1834; --ink:#f3eefe;
    --muted:#9a90c0; --line:#2c2546; --music:#ff3ca6; --sports:#27d3a2;
    --accent:#7c5cff;
  }
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%,#241a4d 0%,var(--bg) 60%);
    color:var(--ink);min-height:100vh}
  header{padding:28px 20px 10px;max-width:920px;margin:0 auto}
  h1{margin:0;font-size:26px;letter-spacing:.3px}
  h1 .spark{background:linear-gradient(90deg,var(--music),var(--accent),var(--sports));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);margin-top:4px}
  main{max-width:920px;margin:0 auto;padding:8px 20px 60px}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0 6px}
  select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;font-size:15px}
  .meta{color:var(--muted);font-size:14px}
  .track{margin-top:26px}
  .track h2{display:flex;align-items:center;gap:10px;font-size:18px;margin:0 0 12px}
  .pill{font-size:12px;color:var(--muted);border:1px solid var(--line);
    border-radius:999px;padding:2px 9px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;position:relative;overflow:hidden}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
  .music .card::before{background:var(--music)}
  .sports .card::before{background:var(--sports)}
  .cat{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .name{font-weight:650;margin:3px 0 6px;line-height:1.25}
  .name a{color:var(--ink);text-decoration:none;border-bottom:1px dotted var(--muted)}
  .when{font-size:14px;color:#d7cffb}
  .where{font-size:13px;color:var(--muted);margin-top:2px}
  .tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11px;background:var(--panel2);border:1px solid var(--line);
    border-radius:999px;padding:1px 8px;color:#c8bdf2}
  .tag.free,.tag.outdoor,.tag.daytime{color:#ffe27a;border-color:#5a4d1f}
  .tag.headliner{color:#ff9ad1;border-color:#5a2347}
  footer{max-width:920px;margin:0 auto;padding:0 20px 50px;color:var(--muted);font-size:13px}
  a{color:var(--accent)}
  .empty{color:var(--muted);padding:30px 0}
</style>
</head>
<body>
<header>
  <h1>🪩 <span class="spark">Party Scout</span></h1>
  <div class="sub">Weekly SF &amp; Bay Area events digest — music + sports, ranked.</div>
</header>
<main>
  <div class="controls">
    <label class="meta" for="week">Week:</label>
    <select id="week"></select>
    <span class="meta" id="meta"></span>
    <span class="meta">·</span>
    <a class="meta" id="mdlink" href="#" target="_blank" rel="noopener">view markdown</a>
  </div>
  <div id="report"></div>
</main>
<footer>
  Data: <a href="data/index.json">data/index.json</a> ·
  Generated by <code>party-scout-code</code>. One JSON + MD per week.
</footer>
<script>
const TRACKS = [
  {key:"music",  label:"🎶 Music & entertainment"},
  {key:"sports", label:"🏍️ Sports & active"},
];
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

async function getJSON(u){const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw new Error(u+" "+r.status);return r.json();}

function card(it){
  const c = el("div","card");
  if(it.category) c.appendChild(el("div","cat",it.category));
  const name = it.link
    ? `<a href="${it.link}" target="_blank" rel="noopener">${it.name}</a>` : it.name;
  c.appendChild(el("div","name",name));
  const when = [it.day,it.time].filter(Boolean).join(" · ");
  if(when) c.appendChild(el("div","when",when));
  let where = it.area||"";
  if(it.venue) where += (where?" · ":"")+it.venue;
  if(where) c.appendChild(el("div","where","📍 "+where));
  if(it.tags && it.tags.length){
    const wrap = el("div","tags");
    it.tags.forEach(t=>wrap.appendChild(el("span","tag "+t,t)));
    c.appendChild(wrap);
  }
  return c;
}

function render(week){
  const root = el("div");
  TRACKS.forEach(t=>{
    const items = (week.tracks&&week.tracks[t.key])||[];
    if(!items.length) return;
    const sec = el("section","track "+t.key);
    const h = el("h2",null,t.label);
    h.appendChild(el("span","pill",items.length+" events"));
    sec.appendChild(h);
    const grid = el("div","grid");
    items.forEach(it=>grid.appendChild(card(it)));
    sec.appendChild(grid);
    root.appendChild(sec);
  });
  if(!root.childNodes.length) root.appendChild(el("div","empty","No events for this week."));
  const out = document.getElementById("report");
  out.innerHTML=""; out.appendChild(root);
}

async function loadWeek(ws){
  const week = await getJSON(`data/${ws}.json`);
  document.getElementById("meta").textContent =
    (week.window?`window ${week.window}`:"") + (week.title?` · ${week.title}`:"");
  document.getElementById("mdlink").href = `data/${ws}.md`;
  render(week);
}

async function init(){
  try{
    const idx = await getJSON("data/index.json");
    const sel = document.getElementById("week");
    idx.weeks.forEach(w=>{
      const o=el("option");o.value=w.week_start;
      const n=(w.counts?(w.counts.music||0)+(w.counts.sports||0):0);
      o.textContent=`${w.week_start}${w.window?"  ("+w.window+")":""} — ${n} events`;
      sel.appendChild(o);
    });
    sel.addEventListener("change",()=>loadWeek(sel.value));
    if(idx.weeks.length) await loadWeek(idx.weeks[0].week_start);
    else document.getElementById("report").appendChild(el("div","empty","No weeks yet."));
  }catch(e){
    document.getElementById("report").appendChild(
      el("div","empty","Could not load data/index.json — "+e.message));
  }
}
init();
</script>
</body>
</html>
