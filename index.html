<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Party Scout — SF / Bay Area weekly</title>
<link rel="icon" href="favicon.ico" sizes="any">
<link rel="icon" type="image/png" href="favicon-32.png" sizes="32x32">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<meta property="og:title" content="Party Scout — SF / Bay Area weekly">
<meta property="og:image" content="logo.png">
<meta name="theme-color" content="#0c0a14">
<style>
  :root{
    --bg:#0c0a14; --panel:#161226; --panel2:#1d1834; --ink:#f3eefe;
    --muted:#9a90c0; --line:#2c2546; --music:#ff3ca6; --sports:#27d3a2;
    --accent:#7c5cff;
  }
  *{box-sizing:border-box}
  body{margin:0;font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
    background:radial-gradient(1200px 600px at 70% -10%,#241a4d 0%,var(--bg) 60%);
    color:var(--ink);min-height:100vh}
  header{padding:28px 20px 10px;max-width:920px;margin:0 auto}
  .brand{display:flex;align-items:center;gap:14px}
  .logo{border-radius:50%;box-shadow:0 0 22px rgba(124,92,255,.45);flex:none}
  h1{margin:0;font-size:26px;letter-spacing:.3px}
  h1 .spark{background:linear-gradient(90deg,var(--music),var(--accent),var(--sports));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .sub{color:var(--muted);margin-top:4px}
  main{max-width:920px;margin:0 auto;padding:8px 20px 60px}
  .controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;margin:14px 0 6px}
  select{background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:10px;padding:9px 12px;font-size:15px}
  .meta{color:var(--muted);font-size:14px}
  .track{margin-top:26px}
  .track h2{display:flex;align-items:center;gap:10px;font-size:18px;margin:0 0 12px}
  .pill{font-size:12px;color:var(--muted);border:1px solid var(--line);
    border-radius:999px;padding:2px 9px}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
  .card.more-hidden{display:none}
  .showmore{display:block;margin:14px auto 0;cursor:pointer;font-size:14px;
    font-weight:600;color:#cdc3f5;background:var(--panel2);border:1px solid var(--line);
    border-radius:10px;padding:9px 18px;transition:border-color .12s,transform .08s}
  .showmore:hover{border-color:var(--accent);color:#fff;transform:translateY(-1px)}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:13px 14px;position:relative;overflow:hidden;
    display:flex;flex-direction:column}
  .card::before{content:"";position:absolute;left:0;top:0;bottom:0;width:4px}
  .music .card::before{background:var(--music)}
  .sports .card::before{background:var(--sports)}
  .card .anchor{position:absolute;top:7px;right:11px;color:var(--muted);
    text-decoration:none;font-size:14px;font-weight:700;opacity:0;transition:opacity .12s,color .12s}
  .card:hover .anchor{opacity:.55}
  .card .anchor:hover{color:var(--accent);opacity:1}
  .card.focused{outline:2px solid var(--accent);outline-offset:0;
    box-shadow:0 0 0 4px rgba(124,92,255,.28),0 0 22px rgba(124,92,255,.35)}
  .card.inactive{opacity:.6}
  .card.inactive::before{filter:grayscale(.7) brightness(.7)}
  .carried{display:inline-block;margin-top:7px;font-size:11px;color:var(--muted);
    border:1px dashed var(--line);border-radius:8px;padding:1px 8px}
  .foot{margin-top:auto;display:flex;flex-direction:column;align-items:flex-start}
  .acts{display:flex;gap:8px;padding-top:11px;flex-wrap:wrap;align-self:flex-start}
  .btn{font-size:12px;font-weight:600;text-decoration:none;color:#cdc3f5;
    background:var(--panel2);border:1px solid var(--line);border-radius:9px;
    padding:4px 11px;transition:border-color .12s,color .12s,transform .08s}
  .btn:hover{border-color:var(--accent);color:#fff;transform:translateY(-1px)}
  .btn.tix{color:#9affd0;border-color:#1f6e45}
  .btn.tix:hover{border-color:#27d3a2}
  .btn.tix b{font-weight:750;color:#c9ffe6}
  .btn.tix.free{color:#ffe27a;border-color:#5a4d1f}
  .btn.tix.free b{color:#ffe27a}
  .btn.tix.free:hover{border-color:#ffe27a}
  .btn.nolink{pointer-events:none}
  .btn.ph{visibility:hidden}
  .cat{font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:var(--muted)}
  .name{font-weight:650;margin:3px 0 6px;line-height:1.25}
  .name a{color:var(--ink);text-decoration:none;border-bottom:1px dotted var(--muted)}
  .when{font-size:14px;color:#d7cffb}
  .why{font-size:12.5px;font-style:italic;color:#b9aee8;margin-top:8px;
    padding-left:9px;border-left:2px solid var(--accent);line-height:1.4}
  .price{align-self:flex-start;margin-top:11px;font-size:12px;
    font-weight:650;color:#9affd0;background:#10331f;border:1px solid #1f6e45;
    border-radius:8px;padding:1px 8px}
  .price.free{color:#ffe27a;background:#33301a;border-color:#5a4d1f}
  .where{font-size:13px;color:var(--muted);margin-top:2px;align-self:flex-start}
  .where .om{color:var(--accent);text-decoration:none;white-space:nowrap}
  .where .om:hover{text-decoration:underline}
  .tags{margin-top:8px;display:flex;flex-wrap:wrap;gap:6px}
  .tag{font-size:11px;background:var(--panel2);border:1px solid var(--line);
    border-radius:999px;padding:1px 8px;color:#c8bdf2;cursor:pointer;
    transition:border-color .12s,color .12s}
  .tag:hover{border-color:var(--accent);color:#fff}
  .tag.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .tag.free,.tag.outdoor,.tag.daytime{color:#ffe27a;border-color:#5a4d1f}
  .tag.headliner{color:#ff9ad1;border-color:#5a2347}
  .cloud{display:flex;flex-wrap:wrap;gap:8px 10px;align-items:center;
    background:var(--panel);border:1px solid var(--line);border-radius:14px;
    padding:14px 16px;margin-top:16px}
  .cloud .clabel{font-size:12px;text-transform:uppercase;letter-spacing:.6px;
    color:var(--muted);margin-right:4px}
  .chip{cursor:pointer;border:1px solid var(--line);border-radius:999px;
    padding:3px 12px;color:#cdc3f5;background:var(--panel2);line-height:1.3;
    transition:transform .08s ease,border-color .12s ease}
  .chip:hover{transform:translateY(-1px);border-color:var(--accent)}
  .chip .n{color:var(--muted);font-size:.72em;margin-left:5px}
  .chip.on{background:var(--accent);border-color:var(--accent);color:#fff}
  .chip.clear{color:var(--muted);border-style:dashed}
  .chip.chip-hidden{display:none}
  .chip.morechip{color:var(--accent);border-style:dashed;border-color:var(--accent)}
  footer{max-width:920px;margin:0 auto;padding:0 20px 50px;color:var(--muted);font-size:13px}
  a{color:var(--accent)}
  .empty{color:var(--muted);padding:30px 0}
</style>
</head>
<body>
<header>
  <div class="brand">
    <img class="logo" src="logo.png" alt="Party Scout" width="56" height="56">
    <div>
      <h1><span class="spark">Party Scout</span></h1>
      <div class="sub">Weekly SF &amp; Bay Area events digest — music + sports, ranked.</div>
    </div>
  </div>
</header>
<main>
  <div class="controls">
    <label class="meta" for="week">Week:</label>
    <select id="week"></select>
    <span class="meta" id="meta"></span>
    <span class="meta">·</span>
    <a class="meta" id="mdlink" href="#" target="_blank" rel="noopener">view markdown</a>
  </div>
  <div id="cloud" class="cloud" hidden></div>
  <div id="report"></div>
</main>
<footer>
  Data: <a href="data/index.json">data/index.json</a> ·
  Generated by <code>party-scout-code</code>. One JSON + MD per week.
</footer>
<script>
const TRACKS = [
  {key:"music",  label:"🎶 Music & entertainment"},
  {key:"sports", label:"🏍️ Sports & active"},
];
// Chronological day order for sorting cards (the weekend window is Thu–Sun).
const DAY_ORDER = {Thu:0,Fri:1,Sat:2,Sun:3,Mon:4,Tue:5,Wed:6};
const el = (t,c,h)=>{const e=document.createElement(t);if(c)e.className=c;if(h!=null)e.innerHTML=h;return e;};

// iOS / iPadOS / macOS -> Apple Maps; everything else -> Google Maps.
const APPLE = /iPhone|iPad|iPod|Macintosh|Mac OS X/i.test(
  (navigator.platform||"")+" "+(navigator.userAgent||""));
function mapsUrl(m){ if(!m) return ""; return APPLE ? (m.apple||m.google) : (m.google||m.apple); }
// Buy-tickets target: direct ticketer URL > event listing link. NEVER a search
// engine — only send to the actual ticket seller/listing. Empty -> no button.
function ticketsUrl(it){ return it.tickets || ""; }
function btn(href,cls,label){
  const a = el("a","btn"+(cls?" "+cls:""),label);
  a.href=href; a.target="_blank"; a.rel="noopener";
  return a;  // raw URL never shown as text — only the label
}

async function getJSON(u){const r=await fetch(u,{cache:"no-store"});if(!r.ok)throw new Error(u+" "+r.status);return r.json();}

function card(it){
  const c = el("div","card"+(it.active===false?" inactive":""));
  if(it.eid){
    c.id = it.eid;            // anchor target for deep-link /#<eid>
    const a = el("a","anchor","#");
    const wk = state.week && state.week.week_start;
    a.href = wk ? `#/${wk}/${it.eid}` : "#"+it.eid;
    a.title = "Link to this event";
    c.appendChild(a);
  }
  if(it.category) c.appendChild(el("div","cat",it.category));
  c.appendChild(el("div","name",it.name));
  const when = [it.day,it.time].filter(Boolean).join(" · ");
  if(when) c.appendChild(el("div","when",when));
  let where = it.area||"";
  if(it.venue) where += (where?" · ":"")+it.venue;
  const mUrl = mapsUrl(it.maps);
  if(where){
    const d = el("div","where","📍 "+where);
    if(mUrl){
      const a = el("a","om","open map");
      a.href=mUrl; a.target="_blank"; a.rel="noopener";
      d.insertAdjacentText("beforeend"," · ");
      d.appendChild(a);
    }
    c.appendChild(d);
  }
  if(it.why) c.appendChild(el("div","why",it.why));
  // Footer (tags + carried note + price/Buy-ticket) is pinned to the bottom of the
  // card so tags AND buttons line up across a row regardless of title/where height.
  const foot = el("div","foot");
  if(it.tags && it.tags.length){
    const wrap = el("div","tags");
    it.tags.forEach(t=>{
      const tg = el("span","tag "+t+(state.tag===t?" on":""),t);
      tg.onclick = ()=>{ state.tag = state.tag===t?null:t; render(); };
      wrap.appendChild(tg);
    });
    foot.appendChild(wrap);
  }
  if(it.active===false) foot.appendChild(el("div","carried","↩︎ carried over — not in latest scan"));
  const tUrl = ticketsUrl(it);
  const isFree = it.price && /free|^\$?0\b/i.test(it.price);
  const acts = el("div","acts");
  if(it.link) acts.appendChild(btn(it.link,"","Open"));   // event website / info page
  if(tUrl){
    const label = it.price ? `<b>${it.price}</b> · Buy ticket` : "Buy ticket";
    acts.appendChild(btn(tUrl,"tix"+(isFree?" free":""),label));
  } else if(it.price){
    // No ticket link: show price/Free as a same-size (non-clickable) button.
    acts.appendChild(el("span","btn tix nolink"+(isFree?" free":""),`<b>${it.price}</b>`));
  }
  // Reserve the button row when there's nothing, so tags stay aligned across the row.
  if(!acts.childNodes.length) acts.appendChild(el("span","btn ph","&nbsp;"));
  foot.appendChild(acts);
  c.appendChild(foot);
  return c;
}

const state = {week:null, tag:null};
const SHOW_LIMIT = 21;   // cards shown per track before "Show more"
const CLOUD_LIMIT = 24;  // tags shown before the cloud's "+N more"

function tagCounts(week){
  const m = new Map();
  TRACKS.forEach(t=>((week.tracks&&week.tracks[t.key])||[]).forEach(it=>
    (it.tags||[]).forEach(tag=>m.set(tag,(m.get(tag)||0)+1))));
  return [...m.entries()].sort((a,b)=> b[1]-a[1] || a[0].localeCompare(b[0]));
}

function buildCloud(week){
  const box = document.getElementById("cloud");
  const tags = tagCounts(week);
  box.innerHTML="";
  if(!tags.length){ box.hidden=true; return; }
  box.hidden=false;
  box.appendChild(el("span","clabel","Tags"));
  const max = tags[0][1], min = tags[tags.length-1][1];
  let shown = 0;
  tags.forEach(([tag,n])=>{
    // scale font 0.85–1.5rem by frequency
    const f = max===min ? 1.05 : 0.85 + (n-min)/(max-min)*0.65;
    const active = state.tag===tag;
    const chip = el("span","chip"+(active?" on":""),
      `${tag}<span class="n">${n}</span>`);
    chip.style.fontSize = f.toFixed(2)+"rem";
    chip.onclick = ()=>{ state.tag = active?null:tag; render(); };
    if(shown>=CLOUD_LIMIT && !active) chip.classList.add("chip-hidden");
    else shown++;
    box.appendChild(chip);
  });
  const hidden = box.querySelectorAll(".chip-hidden").length;
  if(hidden){
    const more = el("span","chip morechip",`+${hidden} more`);
    more.onclick = ()=>{ box.querySelectorAll(".chip-hidden").forEach(c=>c.classList.remove("chip-hidden")); more.remove(); };
    box.appendChild(more);
  }
  if(state.tag){
    const c = el("span","chip clear","✕ clear");
    c.onclick = ()=>{ state.tag=null; render(); };
    box.appendChild(c);
  }
}

function render(){
  const week = state.week;
  buildCloud(week);
  const root = el("div");
  TRACKS.forEach(t=>{
    let items = ((week.tracks&&week.tracks[t.key])||[]).slice().sort((a,b)=>
      ((a.active===false)-(b.active===false)) ||
      ((DAY_ORDER[a.day]??9)-(DAY_ORDER[b.day]??9)) ||
      ((b.popularity||0)-(a.popularity||0)) ||
      (((b.ra&&b.ra.interested)||0)-((a.ra&&a.ra.interested)||0)));
    if(state.tag) items = items.filter(it=>(it.tags||[]).includes(state.tag));
    if(!items.length) return;
    const sec = el("section","track "+t.key);
    const h = el("h2",null,t.label);
    h.appendChild(el("span","pill",items.length+" events"));
    sec.appendChild(h);
    const grid = el("div","grid");
    items.forEach((it,idx)=>{
      const cd = card(it);
      if(idx>=SHOW_LIMIT) cd.classList.add("more-hidden");
      grid.appendChild(cd);
    });
    sec.appendChild(grid);
    if(items.length>SHOW_LIMIT){
      const more = el("button","showmore",`Show ${items.length-SHOW_LIMIT} more ▾`);
      more.onclick = ()=>{
        grid.querySelectorAll(".more-hidden").forEach(c=>c.classList.remove("more-hidden"));
        more.remove();
      };
      sec.appendChild(more);
    }
    root.appendChild(sec);
  });
  if(!root.childNodes.length) root.appendChild(el("div","empty",
    state.tag?`No “${state.tag}” events this week.`:"No events for this week."));
  const out = document.getElementById("report");
  out.innerHTML=""; out.appendChild(root);
}

// Hash format: #/<week_start>/<eid>
function parseHash(){
  const h = decodeURIComponent((location.hash||"").replace(/^#\/?/,"")).trim();
  if(!h) return {};
  const p = h.split("/").filter(Boolean);
  return p.length>=2 ? {week:p[0], eid:p.slice(1).join("/")} : {};
}
function focusEid(eid){
  if(!eid) return;
  const card = document.getElementById(eid);
  if(!card) return;
  if(card.classList.contains("more-hidden")){
    const sec = card.closest("section.track");
    if(sec){
      sec.querySelectorAll(".more-hidden").forEach(c=>c.classList.remove("more-hidden"));
      const btn = sec.querySelector(".showmore"); if(btn) btn.remove();
    }
  }
  card.scrollIntoView({behavior:"smooth", block:"center"});
  card.classList.add("focused");
  setTimeout(()=>card.classList.remove("focused"), 2600);
}
// On hashchange: switch week if the hash names a different one, else just focus.
function applyHash(){
  const {week, eid} = parseHash();
  const sel = document.getElementById("week");
  if(week && state.week && week!==state.week.week_start &&
     [...sel.options].some(o=>o.value===week)){
    sel.value = week; loadWeek(week);   // loadWeek focuses the eid afterwards
  } else {
    focusEid(eid);
  }
}
window.addEventListener("hashchange", applyHash);

async function loadWeek(ws){
  const week = await getJSON(`data/${ws}.json`);
  state.week = week; state.tag = null;
  document.getElementById("meta").textContent =
    (week.window?`window ${week.window}`:"") + (week.title?` · ${week.title}`:"");
  document.getElementById("mdlink").href = `data/${ws}.md`;
  render();
  focusEid(parseHash().eid);   // honor #/<week>/<eid> after the week loads
}

// Default week when no #/<week> anchor is given: ALWAYS the current week — the one
// whose Mon–Sun span contains today. Past and future weeks may both exist, but the
// default is current. If today is inside no listed week (gap), pick the NEAREST week
// by date, preferring an upcoming one over a past one. week_start values are Mondays.
function currentWeekStart(wks){
  const now = new Date();
  const t = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const DAY = 86400000;
  let best = null;
  for(const ws of wks){
    const [y,m,d] = ws.split("-").map(Number);
    const s = new Date(y, m-1, d), e = new Date(y, m-1, d+7);
    if(t>=s && t<e) return ws;                        // today is inside this week → current
    // distance in days from today to this week's span (0 if inside, handled above)
    const dist = t<s ? (s-t)/DAY : (t-e)/DAY + 1;
    const future = t < s;
    // nearest wins; tie → prefer upcoming
    if(!best || dist<best.dist || (dist===best.dist && future && !best.future))
      best = {ws, dist, future};
  }
  return best ? best.ws : (wks[0] || null);
}

async function init(){
  try{
    const idx = await getJSON("data/index.json");
    const sel = document.getElementById("week");
    idx.weeks.forEach(w=>{
      const o=el("option");o.value=w.week_start;
      const n=(w.counts?(w.counts.music||0)+(w.counts.sports||0):0);
      o.textContent=`${w.week_start}${w.window?"  ("+w.window+")":""} — ${n} events`;
      sel.appendChild(o);
    });
    sel.addEventListener("change",()=>{ location.hash=""; loadWeek(sel.value); });
    if(idx.weeks.length){
      const wks = idx.weeks.map(w=>w.week_start);
      const hw = parseHash().week;
      const start = (hw && wks.includes(hw)) ? hw
                  : (currentWeekStart(wks) || idx.weeks[0].week_start);
      sel.value = start;
      await loadWeek(start);   // loadWeek focuses the eid from the hash
    } else document.getElementById("report").appendChild(el("div","empty","No weeks yet."));
  }catch(e){
    document.getElementById("report").appendChild(
      el("div","empty","Could not load data/index.json — "+e.message));
  }
}
init();
</script>
</body>
</html>
